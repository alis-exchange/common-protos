<svg viewBox="0 0 900 250" width="100%" height="250" xmlns="http://www.w3.org/2000/svg" style="background-color: #121212;">
  <style>
    .label {
      font-family: 'Google Sans', sans-serif;
      font-weight: bold;
      font-size: 18px;
      fill: white;
    }
    .sublabel {
      font-family: 'Google Sans', sans-serif;
      font-size: 12px;
      fill: #888;
    }
  </style>

  <defs>
    <pattern id="gridLines" x="47" y="52" width="25" height="25" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="25" y2="0" stroke="#4285F4" stroke-width="1" />
      <line x1="0" y1="0" x2="0" y2="25" stroke="#4285F4" stroke-width="1" />
    </pattern>

    <pattern id="gridDots" x="45" y="50" width="25" height="25" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="4" height="4" fill="#4285F4" />
    </pattern>

    <g id="hex">
      <polygon points="15,0 7.5,12.99 -7.5,12.99 -15,0 -7.5,-12.99 7.5,-12.99" transform="rotate(30)" fill="none" stroke="#4285F4" stroke-width="1.5" opacity="0.6" />
    </g>
  </defs>

  <line x1="300" y1="20" x2="300" y2="230" stroke="#333" stroke-dasharray="4,4" />
  <line x1="600" y1="20" x2="600" y2="230" stroke="#333" stroke-dasharray="4,4" />

  <text x="135" y="210" class="label" text-anchor="middle">🅓 Define</text>
  <text x="135" y="230" class="sublabel" text-anchor="middle">Protocol Buffers</text>

  <text x="450" y="210" class="label" text-anchor="middle">🅑 Build</text>
  <text x="450" y="230" class="sublabel" text-anchor="middle">Business Logic</text>

  <text x="765" y="210" class="label" text-anchor="middle">🅓 Deploy</text>
  <text x="765" y="230" class="sublabel" text-anchor="middle">Terraform</text>

  <rect x="47" y="52" width="225" height="125" fill="url(#gridLines)" opacity="0.1" />
  <rect x="45" y="50" width="250" height="150" fill="url(#gridDots)" opacity="0.5" />

  <g stroke="#4285F4" stroke-width="1" opacity="0.4">
    <line x1="380" y1="80" x2="420" y2="60" />
    <line x1="380" y1="80" x2="370" y2="120" />
    <line x1="420" y1="60" x2="470" y2="70" />
    <line x1="420" y1="60" x2="430" y2="110" />
    <line x1="470" y1="70" x2="530" y2="80" />
    <line x1="470" y1="70" x2="480" y2="120" />
    <line x1="470" y1="70" x2="430" y2="110" />
    <line x1="530" y1="80" x2="540" y2="130" />
    <line x1="530" y1="80" x2="480" y2="120" />
    <line x1="370" y1="120" x2="430" y2="110" />
    <line x1="370" y1="120" x2="400" y2="160" />
    <line x1="430" y1="110" x2="480" y2="120" />
    <line x1="430" y1="110" x2="460" y2="150" />
    <line x1="430" y1="110" x2="400" y2="160" />
    <line x1="480" y1="120" x2="540" y2="130" />
    <line x1="480" y1="120" x2="460" y2="150" />
    <line x1="480" y1="120" x2="510" y2="160" />
    <line x1="540" y1="130" x2="510" y2="160" />
    <line x1="400" y1="160" x2="460" y2="150" />
    <line x1="460" y1="150" x2="510" y2="160" />
  </g>

  <circle cx="380" cy="80" r="3" fill="#F02222" />
  <circle cx="420" cy="60" r="3" fill="white" />
  <circle cx="470" cy="70" r="3" fill="white" />
  <circle cx="530" cy="80" r="3" fill="#F02222" />
  <circle cx="370" cy="120" r="3" fill="white" />
  <circle cx="430" cy="110" r="3" fill="white" />
  <circle cx="480" cy="120" r="3" fill="#F02222" />
  <circle cx="540" cy="130" r="3" fill="white" />
  <circle cx="400" cy="160" r="3" fill="white" />
  <circle cx="460" cy="150" r="3" fill="#F02222" />
  <circle cx="510" cy="160" r="3" fill="white" />

  <g id="deploy-hexes">
    <use href="#hex" x="700" y="80" />
    <circle cx="700" cy="80" r="3" fill="#F02222" />

    <use href="#hex" x="750" y="60" />

    <use href="#hex" x="820" y="90" />
    <circle cx="820" cy="90" r="3" fill="#F02222" />

    <use href="#hex" x="680" y="130" />

    <use href="#hex" x="740" y="140" />
    <circle cx="740" cy="140" r="3" fill="#F02222" />

    <use href="#hex" x="810" y="150" />

    <use href="#hex" x="780" y="110" />
    <circle cx="780" cy="110" r="3" fill="#F02222" />
  </g>

  <circle r="4" fill="#ccc">
    <animate attributeName="fill" 
             values="#ccc;#ccc;#F02222;#F02222;#4285F4;#4285F4" 
             keyTimes="0;0.333;0.334;0.666;0.667;1" 
             dur="7s" 
             repeatCount="indefinite" />
    <animateMotion dur="7s" 
                   repeatCount="indefinite" 
                   path="M 0,110 L 20,118 L 40,124 L 60,129 L 80,130 L 100,128 L 120,124 L 140,117 L 160,109 L 180,101 L 200,95 L 220,91 L 240,90 L 260,92 L 280,97 L 300,105 L 320,112 L 340,120 L 360,126 L 380,129 L 400,130 L 420,127 L 440,122 L 460,114 L 480,107 L 500,99 L 520,94 L 540,90 L 560,91 L 580,94 L 600,99 L 620,107 L 640,114 L 660,121 L 680,127 L 700,130 L 720,129 L 740,125 L 760,118 L 780,110 L 800,104 L 820,97 L 840,92 L 860,90 L 880,91 L 900,95" />
  </circle>

</svg>
