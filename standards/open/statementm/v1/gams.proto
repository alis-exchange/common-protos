syntax = "proto3";
package standards.open.statementm.v1;

import "google/protobuf/wrappers.proto";
import "google/type/date.proto";

option go_package = "go.alis.build/common/standards/open/statementm/v1";

// Generic Statement M report template format published on the GAMS platform.
message Gams {
  // Effective date
  google.type.Date effective_date = 1;
  // Fund Name (E4)
  string fund = 2;
  // Fund number/code (J4)
  string fund_code = 3;
  // Manager (A4)
  string manager = 4;

  // Market Values Table with details on cashflows, open/close market values and exposures.
  MarketValuesTable market_values_table = 5;
  // The main table with details on the relevant market values.
  message MarketValuesTable {
    // The list of categories
    repeated Category categories = 1;
    // A single category
    message Category {
      // Row for the category total
      Row total = 1;
      // Category constituents
      repeated Row constituents = 2;
    }

    // Total Assets (Gross of Fees)
    Row total_assets_gross_of_fees = 2;
    // Total Assets (Gross of Fees)
    Row total_assets_net_of_fees = 3;

    // A single row
    message Row {
      // Row title
      // Column: A
      string title = 1;
      // Market Value start
      // Column: B
      google.protobuf.DoubleValue mv_start = 2;
      // Exposure Value start
      // Column: C
      google.protobuf.DoubleValue exposure_start = 3;
      // Market Value start
      // Column: D
      google.protobuf.DoubleValue purchases_consideration = 4;
      // Sales Proceeds
      // Column: E
      google.protobuf.DoubleValue sales_proceeds = 5;
      // Investmtnet Income
      // Column: F
      google.protobuf.DoubleValue investment_income = 6;
      // Nett Cashflow
      // Column: G
      google.protobuf.DoubleValue nett_cashflow = 7;
      // Market value at the end of the month.
      // Column: H
      google.protobuf.DoubleValue mv_end = 8;
      // Expoure value at the end of the month.
      // Column: I
      google.protobuf.DoubleValue exposure_end = 9;
      // Money weighted rate of return.
      // Column: J
      google.protobuf.DoubleValue money_weighted_mv = 10;
      // Modified Dietz
      // Column: K
      google.protobuf.DoubleValue modified_dietz_mv = 11;
    }
  }

  // Cashflows Table
  CashFlowsTable cash_flows_table = 6;
  message CashFlowsTable {
    // Individual rows
    repeated Row rows = 1;
    // Total row
    Row totals = 2;
    // A single Row
    message Row {
      // Effective Date
      google.type.Date effective_date = 1;
      // Instrument Code
      string instrument_code = 2;
      // Contibutions
      google.protobuf.DoubleValue contributions = 3;
      // Withdrawals
      google.protobuf.DoubleValue withdrawals = 4;
      // Expenses
      google.protobuf.DoubleValue expenses = 5;
      // Fees
      google.protobuf.DoubleValue fees = 6;
      // Nett Cash flow
      google.protobuf.DoubleValue nett_cash_flow = 7;
    }
  }
}
