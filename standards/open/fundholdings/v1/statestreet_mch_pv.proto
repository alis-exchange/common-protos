syntax = "proto3";
package standards.open.fundholdings.v1;

import "google/protobuf/wrappers.proto";
import "google/type/date.proto";

option go_package = "open.standards.exchange/protobuf/standards/open/fundholdings/v1";

// MCH_PV report format generated by State Street.
message STATESTREET_MCH_PV {
  // The date that the file data pertains to
  // Note: This is deduced from the period_end_date values of the file received by Statestreet during parsing
  google.type.Date effective_date = 1;
  // A list of MCH_PV records.
  // Each record refers to a row in the original CSV file from Statestreet.
  repeated Record records = 2;
  // A row in the MCH_PV file
  message Record {
    // Fund internal unique fund code (sleeve code, where applicable)
    string fund_code = 1;
    // Fund Name full fund name
    string fund_name = 2;
    // Asset Category
    string asset_category = 3;
    // CUSIP Number
    string cusip = 4;
    // ISIN Number
    string isin = 5;
    // Shares/Par Value number of shares or par value of the security
    google.protobuf.DoubleValue shares_par_value = 6;
    // Security Name
    string security_name = 7;
    // Primary Asset ID internal instrument/security indentifier
    string primary_asset_id = 8;
    // Maturity Date
    google.type.Date maturity_date = 9;
    // Local Currency Code
    string local_currency_code = 10;
    // Base Total Cost weighted average cost of the security
    google.protobuf.DoubleValue base_total_cost = 11;
    // Base Unrealized Gain/Loss
    google.protobuf.DoubleValue base_unrealized_gain_loss = 12;
    // PV Base Market Value
    google.protobuf.DoubleValue pv_base_market_value = 13;
    // Total Net Asset Value total NAV of the fund_code on the given period_end_date
    google.protobuf.DoubleValue total_net_asset_value = 14;
    // Percent of TNA pv_base_market_value over total_net_asset_value of the security/instrument
    google.protobuf.DoubleValue percent_of_tna = 15;
    // Period End Date effective valuation date for the fund_code
    google.type.Date period_end_date = 16;
    // Local Market Value
    google.protobuf.DoubleValue local_market_value = 17;
    // Base Price Amount market price of the instrument/security in base currency on period_end_date
    google.protobuf.DoubleValue base_price_amount = 18;
    // Local Price Amount market price of the instrument/security in local currency on period_end_date
    google.protobuf.DoubleValue local_price_amount = 19;
    // Exchange Rate from local to base currency
    google.protobuf.DoubleValue exchange_rate = 20;
    // Custom ID
    // This ID is generated when the file is parsed
    // This id will be used the foreign_id as there is no other appropriate &
    // unique identifier supplied in this record
    string id = 100;
  }
}
