syntax = "proto3";

package standards.open.fundholdings.v1;

import "google/protobuf/wrappers.proto";
import "google/type/date.proto";

option go_package = "go.alis.build/common/standards/open/fundholdings/v1";

// SECDIST report format generated by JTC.
message APEX_SECDIST {
  // The date that the file data pertains to
  // Note: This is deduced from the name of the file received by JTC during parsing
  google.type.Date effective_date = 1;
  // A list of SECDIST records.
  // Each record refers to a row in the original CSV file from Jtc.
  repeated Record records = 2;
  // A row in the SECDIST file
  message Record {
    // Security number
    string security_number = 1;
    // Full security number
    string security_number_full = 2;
    // Short description of the security
    string security_description_short = 3;
    // Unique qualifier for the security
    string security_unique_qual = 4;
    // Account number of the security
    string account_number = 5;
    // Currency in which the security is issued
    string issue_currency = 6;
    // Currency in which the security is traded
    string trading_currency = 7;
    // Group to which the security belongs
    string asset_group = 8;
    // Traded market value of the security
    google.protobuf.DoubleValue traded_market_value = 9;
    // Traded market value in base currency
    google.protobuf.DoubleValue traded_market_value_base = 10;
    // Current price of the security
    google.protobuf.DoubleValue price = 11;
    // Current price of the security in base currency
    google.protobuf.DoubleValue price_base = 12;
    // Number of shares or par value of the security
    google.protobuf.DoubleValue shares_par = 13;
    // Gross accrued income of the security
    google.protobuf.DoubleValue accrued_income_gross = 14;
    // Gross accrued income in base currency
    google.protobuf.DoubleValue accrued_income_gross_base = 15;
    // Prior accrual of income
    google.protobuf.DoubleValue prior_income_accrual = 16;
    // Current value of the security
    google.protobuf.DoubleValue cost_value = 17;
    // Cost basis of the security
    google.protobuf.DoubleValue cost_basis = 18;
    // Unrealized gain or loss on the security
    google.protobuf.DoubleValue unrealized_gain_loss = 19;
    // Unrealized exchange gain or loss on the security
    google.protobuf.DoubleValue unrealized_exchange_gain_loss = 20;
    // Unrealized market gain or loss on the security
    google.protobuf.DoubleValue unrealized_market_gain_loss = 21;
    // Dividend or interest rate of the security
    google.protobuf.DoubleValue div_int_rate = 22;
    // Ex-date of the security
    google.type.Date ex_date = 23;
    // Ex-date of holdings of the security
    string ex_date_holdings = 24;
    // Exchange rate of the security
    google.protobuf.DoubleValue exchange_rate = 25;
    // Prior coupon date of the security
    string coupon_date_prior = 26;
    // Next coupon date of the security
    string coupon_date_next = 27;
    // Days of accrued interest on the security
    google.protobuf.Int32Value days_of_accrued_interest = 28;
    // Days to maturity of the security
    google.protobuf.Int32Value days_to_maturity = 29;
    // Coupon rate of the security
    google.protobuf.DoubleValue coupon_rate = 30;
    // Price of holdings of the security
    google.protobuf.DoubleValue price_holdings = 31;
    // Flag indicating manual income on holdings of the security
    string manual_income_flag_holdings = 32;
    // Flag indicating manual accrued income on holdings of the security
    string manual_accrued_incm_flag_holdings = 33;
    // CUSIP pricing number of the security
    string cusip_pricing_number = 34;
    // Account number of the security
    string account_number_2 = 35;
    // Inception date of the security
    google.type.Date security_inception_date = 36;
    // Base country of the security
    // The country where the account is based.
    string account_base_country = 37;
    // The currency that the account is denominated in.
    string account_base_currency = 38;
    // The name of the account.
    string account_name = 39;
    // The total number of shares outstanding for the account.
    google.protobuf.DoubleValue total_shares_outstanding = 40;
    // The amount of amortization for the account.
    google.protobuf.DoubleValue amortization = 41;
    // The base amount for the amortization of the account.
    google.protobuf.DoubleValue amortization_base = 42;
    // The amortized cost of the account.
    google.protobuf.DoubleValue amortized_cost = 43;
    // The base amount for the amortized cost of the account.
    google.protobuf.DoubleValue amortized_cost_base = 44;
    // The unrealized exchange gain or loss on intercompany accounts for the account.
    google.protobuf.DoubleValue unrealized_exch_g_l_on_ic = 45;
    // The unrealized foreign exchange gain or loss on receivable/payable accounts for the account.
    google.protobuf.DoubleValue unrealized_fx_gain_loss_on_receivable_payable = 46;
    // The unrealized foreign exchange gain or loss on amortization for the account.
    google.protobuf.DoubleValue unrealized_fx_on_amort = 47;
    // The unrealized foreign exchange gain or loss on income for the account.
    google.protobuf.DoubleValue unrealized_fx_on_income = 48;
    // The base amount for the variation margin of the account.
    google.protobuf.DoubleValue variation_margin_base = 49;
    // The local amount for the variation margin of the account.
    google.protobuf.DoubleValue variation_margin_local = 50;
    // The yield to maturity for the account.
    google.protobuf.DoubleValue yield_to_maturity = 51;
    // The accrual method used for the account.
    string accrual_method = 52;
    // The amortization and accretion to effective maturity for the account.
    string amort_accret_to_eff_maturity = 53;
    // The amortization method used for the account.
    string amortization_method = 54;
    // The category code for the category of the account.
    string category_code_category_only = 55;
    // The category code for the industry of the account.
    string category_code_industry_only = 56;
    // The category code for the sector of the account.
    string category_code_sector_only = 57;
    // The category code for the sector and segment of the account.
    string category_code_sector = 58;
    // The category code for the segment of the account.
    string category_code_segment_only = 59;
    // The category code for the level of the category of the account.
    string category_code_level_category = 60;
    // The category code for the level of the industry of the account.
    string category_code_level_industry = 61;
    // The category code for the level of the segment of the account.
    string category_code_level_segment = 62;
    // The description of the category of the account.
    string category_description = 63;
    // The contract size of the account
    google.protobuf.DoubleValue contract_size = 64;
    // The main income category of the account
    string income_category_main = 65;
    // The sub income category of the account
    string income_category_sub = 66;
    // The issue date of the account
    google.type.Date request_date = 67;
    // The issue price of the account
    google.protobuf.DoubleValue issue_price = 68;
    // The issuer of the account
    string issuer = 69;
    // A memo or note regarding the account
    string com_memo = 70;
    // Custom ID
    // This ID is generated when the file is parsed
    // This id will be used the foreign_id as there is no other appropriate &
    // unique identifier supplied in this record
    string id = 101;
  }
}
