syntax = "proto3";
package standards.open.fundholdings.v1;

import "google/protobuf/wrappers.proto";
import "google/type/date.proto";

option go_package = "open.standards.exchange/protobuf/standards/open/fundholdings/v1";

// FTRDIST report format generated by JTC.
message APEX_FTRDIST {
  // The date that the file data pertains to
  // Note: This is deduced from the name of the file received by JTC during parsing
  google.type.Date effective_date = 1;
  // A list of FTRDIST records.
  // Each record refers to a row in the original CSV file from Jtc.
  repeated Record records = 2;
  // A row in the FTRDIST file
  message Record {
    // Date of source file
    google.type.Date request_date = 1;
    // Account number
    string account_number = 2;
    // Account name
    string account_name = 3;
    // Date of account verification
    google.type.Date account_verification_date = 4;
    // Account class (e.g. individual, joint, etc.)
    string account_class = 5;
    // Net assets of OEIC (Open-Ended Investment Company)
    google.protobuf.DoubleValue oeic_net_assets = 6;
    // Shareholder equity
    google.protobuf.DoubleValue shareholder_equity = 7;
    // Ownership percentage of class
    google.protobuf.DoubleValue class_ownership_percent = 8;
    // Currency of class
    string class_curr = 9;
    // Net income of class in current currency
    google.protobuf.DoubleValue class_curr_net_income = 10;
    // Quoted NAV (Net Asset Value) for OEIC funds
    google.protobuf.DoubleValue quoted_nav_for_oeic_funds = 11;
    // NAV of OEIC
    google.protobuf.DoubleValue oeic_nav = 12;
    // Outstanding units
    google.protobuf.DoubleValue units_outstanding = 13;
    // Total assets
    google.protobuf.DoubleValue total_assets = 14;
    // Total liabilities
    google.protobuf.DoubleValue total_liabilities = 15;
    // Capital value of OEIC
    google.protobuf.DoubleValue oeic_capital_value = 16;
    // Amount of net income
    google.protobuf.DoubleValue net_income_amount = 17;
    // Unrealized gain/loss
    google.protobuf.DoubleValue unrealized_gainloss = 18;
    // Value of securities
    google.protobuf.DoubleValue security_value = 19;
    // Cash balance
    google.protobuf.DoubleValue cash = 20;
    // Foreign currency
    google.protobuf.DoubleValue foreign_currency = 21;
    // Accrued income
    google.protobuf.DoubleValue accrued_income = 22;
    // Accrued withholding
    google.protobuf.DoubleValue accrued_withholding = 23;
    // Net accrued income after withholding
    google.protobuf.DoubleValue accrued_income_net_accrued_withholding = 24;
    // Amount to reclaim from accrued income
    google.protobuf.DoubleValue reclaim_accrued = 25;
    // Capital assets receivable
    google.protobuf.DoubleValue capital_assets_receivable = 26;
    // Capital shares receivable
    google.protobuf.DoubleValue capital_shares_receivable = 27;
    // Currency receivable less forwards
    google.protobuf.DoubleValue currency_recv_less_forwards = 28;
    // Spot receivable
    google.protobuf.DoubleValue spot_receivable = 29;
    // Securities sold receivable
    google.protobuf.DoubleValue securities_sold_receivable = 30;
    // Net reclaim receivable after accrued
    google.protobuf.DoubleValue reclaim_receivable_net_accrued = 31;
    // Short income receivable in foreign currency
    google.protobuf.DoubleValue currency_short_income_recv = 32;
    // Short sale receivable in foreign currency
    google.protobuf.DoubleValue currency_short_sale_recv = 33;
    // Unrealized gain on foreign exchange contracts
    google.protobuf.DoubleValue unrealized_gain_on_fec = 34;
    // Variation margins receivable
    google.protobuf.DoubleValue variation_margins_receivable = 35;
    // Other receivables (true amount)
    google.protobuf.DoubleValue other_receivables_true = 36;
    // Appreciation/depreciation of futures
    google.protobuf.DoubleValue futures_apprecdeprec = 37;
    // Appreciation/depreciation of futures transactions
    google.protobuf.DoubleValue futures_apprecdeprec_trans = 38;
    //Margin deposits
    google.protobuf.DoubleValue margin_deposits = 39;
    //Accrued expenses
    google.protobuf.DoubleValue accrued_expense = 40;
    //Prepaid expenses
    google.protobuf.DoubleValue prepaid_expense = 41;
    //Expenses paid during the period
    google.protobuf.DoubleValue expenses_paid_during_period = 42;
    //Total class-specific expenses for the fund
    google.protobuf.DoubleValue fund_total_class_specific_exp_curr = 43;
    //Variation margins for positions
    google.protobuf.DoubleValue variation_margins_positions = 44;
    //Variation margins for assets transactions
    google.protobuf.DoubleValue variation_margins_assets_transactions = 45;
    //Other assets that are true
    google.protobuf.DoubleValue other_assets_true = 46;
    //Other payables
    google.protobuf.DoubleValue other_payables = 47;
    //Other receivables
    google.protobuf.DoubleValue other_receivables = 48;
    //Accrued capital expenses
    google.protobuf.DoubleValue accrued_capital_expense = 49;
    //Broker commissions payable
    google.protobuf.DoubleValue broker_commissions_payable = 50;
    //Capital gains payable
    google.protobuf.DoubleValue capital_gains_payable = 51;
    //Capital assets payable
    google.protobuf.DoubleValue capital_assets_payable = 52;
    //Total inflation compensation earned
    google.protobuf.DoubleValue total_inflat_comp_earned = 53;
    //Capital shares payable
    google.protobuf.DoubleValue capital_shares_payable = 54;
    //Currency payable less forwards
    google.protobuf.DoubleValue currency_payable_less_forwards = 55;
    //Spot payable
    google.protobuf.DoubleValue spot_payable = 56;
    //Income payable
    google.protobuf.DoubleValue income_payable = 57;
    //Securities purchased payable
    google.protobuf.DoubleValue securities_purchased_payable = 58;
    //Unrealized loss on fair value estimates
    google.protobuf.DoubleValue unrealized_loss_on_fec = 59;
    //Variation margins payable
    google.protobuf.DoubleValue variation_margins_payable = 60;
    //Other payables that are true
    google.protobuf.DoubleValue other_payables_true = 61;
    //Short securities market value
    google.protobuf.DoubleValue short_scty_market = 62;
    //Valuation period end date ()
    google.type.Date valuation_period_end_date = 63;
    //Full offer valuation ()
    google.protobuf.DoubleValue full_offer_valuation = 64;
    //Rounded mid price ()
    google.protobuf.DoubleValue rounded_mid_price = 65;
    //OEIC quoted NAV ()
    google.protobuf.DoubleValue oeic_quoted_nav = 66;
    //Class current NAV ()
    google.protobuf.DoubleValue class_curr_nav = 67;
    //Class current net assets (current) ()
    google.protobuf.DoubleValue class_curr_net_assets_current = 68;
    //Net assets ()
    google.protobuf.DoubleValue net_assets = 69;
    //Account base currency ()
    string account_base_currency = 70;
    //UK security value offer ()
    google.protobuf.DoubleValue uk_security_value_offer = 71;
    //Units in issue total ()
    google.protobuf.DoubleValue units_in_issue_total = 72;
    //Income collected during the period ()
    google.protobuf.DoubleValue income_collected_during_period = 73;
    //Creation value ()
    google.protobuf.DoubleValue creation_value = 74;
    //Class current redemptions (local) ()
    google.protobuf.DoubleValue class_curr_redemptions_local = 75;
    //Class current subscriptions (local) ()
    google.protobuf.DoubleValue class_curr_subscriptions_local = 76;
    //Class current equalization rate (local) ()
    google.protobuf.DoubleValue class_curr_equalization_rate_local = 77;
    //Class current income rate (local) ()
    google.protobuf.DoubleValue class_curr_income_rate_local = 78;
    //Account base country ()
    string account_base_country = 79;
    //Unrealized exchange gain/loss ()
    google.protobuf.DoubleValue unrealized_exchange_gl = 80;
    //Unrealized security gain/loss
    google.protobuf.DoubleValue unreal_security_gainloss = 81;
    //Unrealized FX gain/loss (receivable/payable)
    google.protobuf.DoubleValue unrealized_fx_gl_recvblpaybl = 82;
    //Class currency unrealized FX gain/loss (prior period)
    google.protobuf.DoubleValue class_currency_unreal_fx_gl_prior = 83;
    //Class currency unrealized FX gain/loss (current period)
    google.protobuf.DoubleValue class_curr_unreal_fx_gl_current = 84;
    //Capital offer price
    google.protobuf.DoubleValue capital_offer_price = 85;
    //Account sub-type
    string account_sub_type = 86;
    //Prior creation amount
    google.protobuf.DoubleValue prior_creation_amt = 87;
    //Prior creation price
    google.protobuf.DoubleValue prior_creation_price = 88;
    //Report account short name
    string report_acct_short_name = 89;
    //NAV with 8 decimal places
    google.protobuf.DoubleValue nav_prev_8_decimals = 90;
    //Prior valuation date
    google.type.Date prior_valuation_date = 91;
  }
}
