syntax = "proto3";
package standards.open.fundholdings.v1;

import "google/protobuf/wrappers.proto";
import "google/type/date.proto";

option go_package = "open.standards.exchange/protobuf/standards/open/fundholdings/v1";

// Portfolio Valuation report format generated by Prescient.
message PRESCIENT_PV {
  // The effective date that this valuation data pertains to
  google.type.Date effective_date = 1;

  // A list of valuation records, each representing one row from the source data file
  repeated Record records = 2;

  // A row in the Prescient PV file
  message Record {
    // Name of the fund or entity
    string entity_name = 1;

    // First-level classification (e.g. CASH, EQUITIES)
    string first_level_backup = 2;

    // Second-level classification within the first (e.g. Traded Cash, CONSUMER STAPLES)
    string second_level_backup = 3;

    // Name of the issue/security
    string issue_name = 4;

    // Internal or primary asset ID (instrument identifier)
    string primary_asset_id = 5;

    // Nominal quantity or number of units held
    google.protobuf.DoubleValue original_nominal = 6;

    // Book value of the position, excluding accrued interest
    google.protobuf.DoubleValue clean_book_value = 7;

    // Market value of the position, excluding accrued interest
    google.protobuf.DoubleValue clean_market_value = 8;

    // Cash held in the account related to this position
    google.protobuf.DoubleValue settled_cash_position = 9;

    // Interest or income accrued but not yet received
    google.protobuf.DoubleValue accrued_income = 10;

    // Dividend receivable amount
    google.protobuf.DoubleValue dividend_receivable = 11;

    // Total income based on market value
    google.protobuf.DoubleValue sum_of_market_value_income = 12;

    // Market price or yield
    google.protobuf.DoubleValue market_price_yield = 13;

    // Percentage share of this position relative to total market value
    google.protobuf.DoubleValue percent_of_total_market_value = 14;

    // Effective date of the report
    google.type.Date report_effective_date = 15;

    // Ticker symbol (e.g. stock exchange symbol)
    string ticker = 16;

    // Name of the issuer of the instrument
    string issuer = 17;

    // Currency code (e.g. ZAR, USD)
    string currency = 18;

    // Coupon interest due to be received
    google.protobuf.DoubleValue coupon_receivable = 19;

    // Maturity date of the instrument (if applicable)
    google.type.Date maturity_date = 20;

    // ISIN (International Securities Identification Number)
    string isin_code = 21;

    // Internal entity ID (e.g. fund code)
    string entity_id = 22;

    // Alternate asset ID (e.g. Bloomberg ID)
    string alt_asset_id = 23;

    // Next coupon payment date (if applicable)
    google.type.Date next_coupon_date = 24;

    // Coupon rate or value
    google.protobuf.DoubleValue coupon = 25;
  }
}
