syntax = "proto3";

package alis.a2a.extension.history.v1;

import "alis/open/iam/v1/iam.proto";

import "google/iam/v1/iam_policy.proto";

import "google/iam/v1/policy.proto";

import "google/protobuf/empty.proto";

import "google/protobuf/field_mask.proto";

import "google/protobuf/struct.proto";

import "google/protobuf/timestamp.proto";

import "lf/a2a/v1/a2a.proto";

option go_package = "github.com/alis-exchange/common-protos.git/alis/a2a/extension/history/v1";

// An A2AHistory resource
message A2AHistory {
  // The resource name of the A2AHistory.
  // a2ahistories/{context_id}
  string name = 1;

  // Generated display name from the first event in a A2AHistory.
  string display_name = 2;

  // The agent_id, e.g. finance-agent-v1
  string agent_id = 3;

  // The agent display name, e.g. Finance Agent
  string agent_display_name = 4;

  // When this A2AHistory was created.
  google.protobuf.Timestamp create_time = 98;
}

// An A2AHistoryEvent resource
message A2AHistoryEvent {
  // The resource name of the event.
  // a2ahistories/{context_id}/events/{event_id}
  string name = 1;

  oneof payload {
    // A Task object containing the current state of the task.
    lf.a2a.v1.Task task = 2;

    // A Message object containing a message from the client/user.
    lf.a2a.v1.Message message = 3;

    // An event indicating a task status update.
    lf.a2a.v1.TaskStatusUpdateEvent status_update = 4;

    // An event indicating a task artifact update.
    lf.a2a.v1.TaskArtifactUpdateEvent artifact_update = 5;
  }

  // When this event was created.
  google.protobuf.Timestamp create_time = 98;
}

// Request to appending an event.
message AppendEventRequest {
  // The event to create.
  // Parent A2AHistory deduced from the event-provided context_id.
  A2AHistoryEvent event = 2;

  // The agent_id, e.g. finance-agent-v1
  // Only used on first event in a A2AHistory.
  string agent_id = 3;

  reserved 1;
}

// Response to appending an event.
message AppendEventResponse {
}

// Request to delete an A2AHistory.
message DeleteA2AHistoryRequest {
  // The resource name of the A2AHistory to delete.
  string name = 1;
}

// Request to get an event.
message GetA2AHistoryEventRequest {
  // The resource name of the event to retrieve.
  // Format: a2ahistories/{context_id}/events/{event_id}
  string name = 1;

  // A read mask to specify which fields to return.
  // If not specified, view will determine the fields returned.
  google.protobuf.FieldMask read_mask = 3;
}

// Request to get an A2AHistory.
message GetA2AHistoryRequest {
  // The resource name of the A2AHistory to retrieve.
  string name = 1;

  // A read mask to specify which fields to return.
  // If not specified, view will determine the fields returned.
  google.protobuf.FieldMask read_mask = 3;
}

// Request to list A2AHistories.
message ListA2AHistoriesRequest {
  // The maximum number of A2A Histories to return.
  int32 page_size = 2;

  // A page token to retrieve the next page of results.
  string page_token = 3;

  // Optional filtering of Histories by the "agent_id" who produced the underlying Events.
  // Example: my-agent-v1. However, this can be any unique identifier that client decides to use.
  string agent_id = 4;

  // A read mask to specify which fields to return.
  // If not specified, view will determine the fields returned.
  google.protobuf.FieldMask read_mask = 5;

  reserved 1;
}

// Response for ListA2AHistories.
message ListA2AHistoriesResponse {
  // The list of a2a histories.
  repeated A2AHistory histories = 1;

  // A token to retrieve the next page of results.
  string next_page_token = 2;
}

// Request to list events.
message ListEventsRequest {
  // The parent A2AHistory resource name.
  // Format: a2ahistories/{context_id}
  string parent = 1;

  // The maximum number of events to return.
  int32 page_size = 2;

  // A page token to retrieve the next page of results.
  string page_token = 3;

  // A read mask to specify which fields to return.
  // If not specified, view will determine the fields returned.
  google.protobuf.FieldMask read_mask = 5;
}

// Response for ListA2AHistoryEvents.
message ListEventsResponse {
  // The list of events.
  repeated A2AHistoryEvent events = 1;

  // A token to retrieve the next page of results.
  string next_page_token = 2;
}

// Request to stream events.
message StreamEventsRequest {
  // The parent A2AHistory resource name
  // Format: a2ahistories/{context_id}
  string parent = 1;

  // A read mask to specify which fields to return.
  // If not specified, view will determine the fields returned.
  google.protobuf.FieldMask read_mask = 3;
}

// A2AHistoryService
service A2AHistoryService {
  // Adds principals or updates the roles existing principals have on an IAM Policy protected resource.
  rpc AddIamBindings ( alis.open.iam.v1.AddIamBindingsRequest ) returns ( google.iam.v1.Policy );

  // Appends an event to a given A2AHistory
  rpc AppendEvent ( AppendEventRequest ) returns ( AppendEventResponse );

  // Returns permissions that a caller has on the specified resources.
  rpc BatchTestIamPermissions ( alis.open.iam.v1.BatchTestIamPermissionsRequest ) returns ( alis.open.iam.v1.BatchTestIamPermissionsResponse );

  // Deletes an A2AHistory.
  rpc DeleteA2AHistory ( DeleteA2AHistoryRequest ) returns ( A2AHistory );

  // Gets an A2AHistory by its resource name.
  rpc GetA2AHistory ( GetA2AHistoryRequest ) returns ( A2AHistory );

  // Gets the IAM policy for a resource implemented in this service.
  rpc GetIamPolicy ( google.iam.v1.GetIamPolicyRequest ) returns ( google.iam.v1.Policy );

  // Lists all histories.
  rpc ListA2AHistories ( ListA2AHistoriesRequest ) returns ( ListA2AHistoriesResponse );

  // Lists all events.
  rpc ListEvents ( ListEventsRequest ) returns ( ListEventsResponse );

  // Removes principals or some of the roles they have on an IAM Policy protected resource.
  rpc RemoveIamBindings ( alis.open.iam.v1.RemoveIamBindingsRequest ) returns ( google.iam.v1.Policy );

  // Sets the IAM policy for a resource implemented in this service.
  rpc SetIamPolicy ( google.iam.v1.SetIamPolicyRequest ) returns ( google.iam.v1.Policy );

  // Stream events.
  rpc StreamEvents ( StreamEventsRequest ) returns ( stream A2AHistoryEvent );

  // Returns permissions that a caller has on the specified resource.
  rpc TestIamPermissions ( google.iam.v1.TestIamPermissionsRequest ) returns ( google.iam.v1.TestIamPermissionsResponse );
}
