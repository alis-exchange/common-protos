syntax = "proto3";

package alis.a2a.extension.history.v1;

import "alis/open/iam/v1/iam.proto";

import "google/iam/v1/iam_policy.proto";

import "google/iam/v1/policy.proto";

import "google/protobuf/empty.proto";

import "google/protobuf/field_mask.proto";

import "google/protobuf/timestamp.proto";

import "lf/a2a/v1/a2a.proto";

option go_package = "go.alis.build/a2a/extension/history";

// Request to appending an event.
message AppendThreadEventRequest {
  // The event to create.
  // Parent Thread deduced from the event-provided context_id.
  ThreadEvent event = 2;

  // The agent_id, e.g. finance-agent-v1
  // Only used on first event in a Thread.
  string agent_id = 3;

  reserved 1;
}

// Response to appending an event.
message AppendThreadEventResponse {
}

// Request to delete an Thread.
message DeleteThreadRequest {
  // The resource name of the Thread to delete.
  string name = 1;
}

// Request to get an event.
message GetThreadEventRequest {
  // The resource name of the event to retrieve.
  // Format: threads/{context_id}/events/{event_id}
  string name = 1;

  // A read mask to specify which fields to return.
  // If not specified, view will determine the fields returned.
  google.protobuf.FieldMask read_mask = 3;
}

// Request to get an Thread.
message GetThreadRequest {
  // The resource name of the Thread to retrieve.
  string name = 1;

  // A read mask to specify which fields to return.
  // If not specified, view will determine the fields returned.
  google.protobuf.FieldMask read_mask = 3;
}

// Request to list events.
message ListThreadEventsRequest {
  // The parent Thread resource name.
  // Format: threads/{context_id}
  string parent = 1;

  // The maximum number of events to return.
  int32 page_size = 2;

  // A page token to retrieve the next page of results.
  string page_token = 3;

  // A read mask to specify which fields to return.
  // If not specified, view will determine the fields returned.
  google.protobuf.FieldMask read_mask = 5;
}

// Response for ListThreadEvents.
message ListThreadEventsResponse {
  // The list of events.
  repeated ThreadEvent events = 1;

  // A token to retrieve the next page of results.
  string next_page_token = 2;
}

// Request to list Threads.
message ListThreadsRequest {
  // The maximum number of A2A Threads to return.
  int32 page_size = 2;

  // A page token to retrieve the next page of results.
  string page_token = 3;

  // Optional filtering of Threads by the "agent_id" who produced the underlying Events.
  // Example: my-agent-v1. However, this can be any unique identifier that client decides to use.
  string agent_id = 4;

  // A read mask to specify which fields to return.
  // If not specified, view will determine the fields returned.
  google.protobuf.FieldMask read_mask = 5;

  reserved 1;
}

// Response for ListThreads.
message ListThreadsResponse {
  // The list of a2a treads.
  repeated Thread threads = 1;

  // A token to retrieve the next page of results.
  string next_page_token = 2;
}

// Request to stream events.
message StreamThreadEventsRequest {
  // The parent Thread resource name
  // Format: threads/{context_id}
  string parent = 1;

  // A read mask to specify which fields to return.
  // If not specified, view will determine the fields returned.
  google.protobuf.FieldMask read_mask = 3;
}

// An Thread resource
message Thread {
  // The resource name of the Thread.
  // threads/{context_id}
  string name = 1;

  // Generated display name from the first event in a Thread.
  string display_name = 2;

  // The agent_id, e.g. finance-agent-v1
  string agent_id = 3;

  // The agent display name, e.g. Finance Agent
  string agent_display_name = 4;

  // When this Thread was created.
  google.protobuf.Timestamp create_time = 98;
}

// An ThreadEvent resource
message ThreadEvent {
  // The resource name of the event.
  // threads/{context_id}/events/{event_id}
  string name = 1;

  oneof payload {
    // A Task object containing the current state of the task.
    lf.a2a.v1.Task task = 2;

    // A Message object containing a message from the client/user.
    lf.a2a.v1.Message message = 3;

    // An event indicating a task status update.
    lf.a2a.v1.TaskStatusUpdateEvent status_update = 4;

    // An event indicating a task artifact update.
    lf.a2a.v1.TaskArtifactUpdateEvent artifact_update = 5;
  }

  // When this event was created.
  google.protobuf.Timestamp create_time = 98;
}

// Manages persisted A2A conversation threads and their events, including
// thread listing, event appends, event streaming, and IAM policy access.
service ThreadService {
  // Adds principals or updates the roles existing principals have on an IAM Policy protected resource.
  rpc AddIamBindings ( alis.open.iam.v1.AddIamBindingsRequest ) returns ( google.iam.v1.Policy );

  // Appends an event to a given Thread
  rpc AppendThreadEvent ( AppendThreadEventRequest ) returns ( AppendThreadEventResponse );

  // Returns permissions that a caller has on the specified resources.
  rpc BatchTestIamPermissions ( alis.open.iam.v1.BatchTestIamPermissionsRequest ) returns ( alis.open.iam.v1.BatchTestIamPermissionsResponse );

  // Deletes an Thread.
  rpc DeleteThread ( DeleteThreadRequest ) returns ( google.protobuf.Empty );

  // Gets the IAM policy for a resource implemented in this service.
  rpc GetIamPolicy ( google.iam.v1.GetIamPolicyRequest ) returns ( google.iam.v1.Policy );

  // Gets an Thread by its resource name.
  rpc GetThread ( GetThreadRequest ) returns ( Thread );

  // Lists all events.
  rpc ListThreadEvents ( ListThreadEventsRequest ) returns ( ListThreadEventsResponse );

  // Lists all Threads.
  rpc ListThreads ( ListThreadsRequest ) returns ( ListThreadsResponse );

  // Removes principals or some of the roles they have on an IAM Policy protected resource.
  rpc RemoveIamBindings ( alis.open.iam.v1.RemoveIamBindingsRequest ) returns ( google.iam.v1.Policy );

  // Sets the IAM policy for a resource implemented in this service.
  rpc SetIamPolicy ( google.iam.v1.SetIamPolicyRequest ) returns ( google.iam.v1.Policy );

  // Stream events.
  rpc StreamThreadEvents ( StreamThreadEventsRequest ) returns ( stream ThreadEvent );

  // Returns permissions that a caller has on the specified resource.
  rpc TestIamPermissions ( google.iam.v1.TestIamPermissionsRequest ) returns ( google.iam.v1.TestIamPermissionsResponse );
}
