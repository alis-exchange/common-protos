  // credit rating
  message CreditRating {
    // Agency that has assigned rating to instrument or entity
    RatingAgency rating_agency = 1;
    // Rating assigned to instrument or entity
    CreditRatingScale credit_rating_scale = 2;
  }

  // The FIGI type.
  enum FigiType {
    // Figi Type is not provided
    FIGI_TYPE_UNSPECIFIED = 0;
    // Global FIGI
    GLOBAL = 1;
    // Custom generated figi, not available on www.openfigi.com, yet...
    CUSTOM = 2;
  }

  // Validation details
  message Validation {
    // Is valid
    bool is_valid = 1;
    // Fields which require attention
    repeated Field invalid_fields = 2;
    // A single Field
    message Field {
      // Name of the field
      // Examples: reg28.category, cisca.issuer, etc.
      string name = 1;
      // Validation notes for the field.
      string notes = 2;
    }
  }
}
