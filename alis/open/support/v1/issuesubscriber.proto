syntax = "proto3";

package alis.open.support.v1;

import "alis/open/iam/v1/iam.proto";
import "alis/open/validation/v1/validation.proto";
import "google/iam/v1/iam_policy.proto";
import "google/iam/v1/policy.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "open.alis.services/protobuf/alis/open/support/v1";

// IssueSubscribersService provides RPCs for managing IssueSubscriber resources.
service IssueSubscribersService {
  // Validates any proto message that is used directly or indirectly by this service.
  // Most common use issue is to validate request messages from a client-side application.
  rpc ValidateMessage(alis.open.validation.v1.ValidateMessageRequest) returns (alis.open.validation.v1.ValidateMessageResponse) {}
  // Retrieves the validation rules for any proto message that is used directly or indirectly by this service.
  // Serves as live auto-documentation of the validation rules in this service.
  rpc RetrieveRules(alis.open.validation.v1.RetrieveRulesRequest) returns (alis.open.validation.v1.RetrieveRulesResponse) {}

  // Gets the IAM policy for a resource implemented in this service.
  rpc GetIamPolicy(google.iam.v1.GetIamPolicyRequest) returns (google.iam.v1.Policy) {}
  // Sets the IAM policy for a resource implemented in this service.
  rpc SetIamPolicy(google.iam.v1.SetIamPolicyRequest) returns (google.iam.v1.Policy) {}
  // Returns permissions that a caller has on the specified resource.
  rpc TestIamPermissions(google.iam.v1.TestIamPermissionsRequest) returns (google.iam.v1.TestIamPermissionsResponse) {}
  // Adds principals or updates the roles existing principals have on an IAM Policy protected resource.
  rpc AddIamBindings(alis.open.iam.v1.AddIamBindingsRequest) returns (google.iam.v1.Policy) {}
  // Removes principals or some of the roles they have on an IAM Policy protected resource.
  rpc RemoveIamBindings(alis.open.iam.v1.RemoveIamBindingsRequest) returns (google.iam.v1.Policy) {}

  // Subscribes a user to an issue.
  rpc CreateIssueSubscriber(CreateIssueSubscriberRequest) returns (IssueSubscriber) {}
  // Gets a user's subscription to an issue.
  rpc GetIssueSubscriber(GetIssueSubscriberRequest) returns (IssueSubscriber) {}
  // Gets a list of subscribers for an issue.
  rpc ListIssueSubscribers(ListIssueSubscribersRequest) returns (ListIssueSubscribersResponse) {}
  // Deletes an issue subscription.
  rpc DeleteIssueSubscriber(DeleteIssueSubscriberRequest) returns (google.protobuf.Empty) {}
}

// An IssueSubscriber represents a user who is subscribed to an issue.
message IssueSubscriber {
  // The unique name of the IssueSubscription which cannot be changed.
  // Format: issues/([a-z0-9-]{2,50})/subscribers/([a-z0-9-]{2,50})
  string name = 1;
  // Output only. The time when this IssueSubscription was created.
  google.protobuf.Timestamp create_time = 98;
  // Output only . The time when this IssueSubscription was last updated.
  google.protobuf.Timestamp update_time = 99;
}

// The request message for the CreateIssueSubscriber method.
message CreateIssueSubscriberRequest {
  // Name of the issue to subscribe to.
  // Format: issues/([a-z0-9-]{2,50})
  string parent = 1;
  // The IssueSubscriber to create.
  IssueSubscriber issue_subscriber = 2;
  // Subscriber id.
  // Typically a user id.
  // Format: ([a-z0-9-]{2,50})
  string subscriber_id = 3;
}

// The request message for the DeleteIssueSubscriber method.
message DeleteIssueSubscriberRequest {
  // Name of the issue subscription to delete.
  // Format: issues/([a-z0-9-]{2,50})/subscribers/([a-z0-9-]{2,50})
  string name = 1;
}

// The request message for the GetIssueSubscriber method.
message GetIssueSubscriberRequest {
  // Name of the issue subscription to get.
  // Format: issues/([a-z0-9-]{2,50})/subscribers/([a-z0-9-]{2,50})
  string name = 1;
}

// The request message for the ListIssueSubscribers method.
message ListIssueSubscribersRequest {
  // Name of the issue to list subscribers for.
  // Format: issues/([a-z0-9-]{2,50})
  string parent = 1;
  // The maximum number of IssueSubscribers to return.
  int32 page_size = 2;
  // A page token, received from a previous ListIssueSubscribers call.
  string page_token = 3;
  // The fields to return in snake_issue.
  // All fields are returned if not set.
  google.protobuf.FieldMask read_mask = 4;
  // The filter to apply
  string filter = 5;
  // The order to sort the results by
  // Default is descending
  //
  // Format: "field_name {asc|desc}"
  //
  // Only update_time is supported at the moment.
  string order_by = 6;
}

// The response message for the ListIssueSubscribers method.
message ListIssueSubscribersResponse {
  // The list of subscribers for the issue.
  repeated IssueSubscriber subscribers = 1;
  // A token to retrieve the next page of results.
  string next_page_token = 2;
}
