syntax = "proto3";

package alis.open.pubsub.v1;

import "google/protobuf/timestamp.proto";

option go_package = "open.alis.services/protobuf/alis/open/pubsub/v1";

// PubSubMessage is the body/payload/data attribute from an Pub/Sub push HTTP request.
// As we are using Pub/Sub for many of our events, we declare this message as
// part of the events package.
message PubSubMessage {
  // A message that is published by publishers and consumed by subscribers. The
  // message must contain either a non-empty data field or at least one attribute.
  // Note that client libraries represent this object differently
  // depending on the language. See the corresponding [client library documentation](https://cloud.google.com/pubsub/docs/reference/libraries) for
  // more information. See [quotas and limits]
  // (https://cloud.google.com/pubsub/quotas) for more information about message
  // limits
  Message message = 1;
  // The Body of a Pub/Sub push subscription.
  message Message {
    // The message data field. If this field is empty, the message must contain
    // at least one attribute.
    bytes data = 1;

    // Attributes for this message. If this field is empty, the message must
    // contain non-empty data. This can be used to filter messages on the
    // subscription.
    map<string, string> attributes = 2;

    // ID of this message, assigned by the server when the message is published.
    // Guaranteed to be unique within the topic. This value may be read by a
    // subscriber that receives a `PubsubMessage` via a `Pull` call or a push
    // delivery. It must not be populated by the publisher in a `Publish` call.
    string message_id = 3;

    // The time at which the message was published, populated by the server when
    // it receives the `Publish` call. It must not be populated by the
    // publisher in a `Publish` call.
    google.protobuf.Timestamp publish_time = 4;

    // If non-empty, identifies related messages for which publish order should be
    // respected. If a `Subscription` has `enable_message_ordering` set to `true`,
    // messages published with the same non-empty `ordering_key` value will be
    // delivered to subscribers in the order in which they are received by the
    // Pub/Sub system. All `PubsubMessage`s published in a given `PublishRequest`
    // must specify the same `ordering_key` value.
    string ordering_key = 5;

    // A temporary fix - pubsub push delivers both messageId and message_id
    // attributes, which is seen as a duplicate in the proto world.
    string message_id1 = 6;

    // A temporary fix - pubsub push delivers both publishTime and publish_time
    // attributes, which is seen as a duplicate in the proto world.
    google.protobuf.Timestamp publish_time1 = 7;
  }
  // Pub/Sub subscription resource name
  string subscription = 2;
}
