syntax = "proto3";

package alis.open.notifications.v1;

import "alis/open/iam/v1/iam.proto";
import "alis/open/validation/v1/validation.proto";
import "google/iam/v1/iam_policy.proto";
import "google/iam/v1/policy.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "open.alis.services/protobuf/alis/open/notifications/v1";

// DevicesService provides RPCs for managing Device resources.
service DevicesService {
  // Validates any proto message that is used directly or indirectly by this service.
  // Most common use issue is to validate request messages from a client-side application.
  rpc ValidateMessage(alis.open.validation.v1.ValidateMessageRequest) returns (alis.open.validation.v1.ValidateMessageResponse) {}
  // Retrieves the validation rules for any proto message that is used directly or indirectly by this service.
  // Serves as live auto-documentation of the validation rules in this service.
  rpc RetrieveRules(alis.open.validation.v1.RetrieveRulesRequest) returns (alis.open.validation.v1.RetrieveRulesResponse) {}

  // Gets the IAM policy for a resource implemented in this service.
  //
  // Resource should be the fully qualified name of the device.
  // Format: users/([a-z0-9-]{2,50})/devices/([a-zA-Z0-9-_]{2,50})
  rpc GetIamPolicy(google.iam.v1.GetIamPolicyRequest) returns (google.iam.v1.Policy) {}
  // Sets the IAM policy for a resource implemented in this service.
  //
  // Resource should be the fully qualified name of the device.
  // Format: users/([a-z0-9-]{2,50})/devices/([a-zA-Z0-9-_]{2,50})
  rpc SetIamPolicy(google.iam.v1.SetIamPolicyRequest) returns (google.iam.v1.Policy) {}
  // Returns permissions that a caller has on the specified resource.
  //
  // Resource should be the fully qualified name of the device.
  // Format: users/([a-z0-9-]{2,50})/devices/([a-zA-Z0-9-_]{2,50})
  rpc TestIamPermissions(google.iam.v1.TestIamPermissionsRequest) returns (google.iam.v1.TestIamPermissionsResponse) {}
  // Adds principals or updates the roles existing principals have on an IAM Policy protected resource.
  //
  // Resource should be the fully qualified name of the device.
  // Format: users/([a-z0-9-]{2,50})/devices/([a-zA-Z0-9-_]{2,50})
  rpc AddIamBindings(alis.open.iam.v1.AddIamBindingsRequest) returns (google.iam.v1.Policy) {}
  // Removes principals or some of the roles they have on an IAM Policy protected resource.
  //
  // Resource should be the fully qualified name of the device.
  // Format: users/([a-z0-9-]{2,50})/devices/([a-zA-Z0-9-_]{2,50})
  rpc RemoveIamBindings(alis.open.iam.v1.RemoveIamBindingsRequest) returns (google.iam.v1.Policy) {}

  // Registers a user's device.
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse) {}

  // Gets a device.
  rpc GetDevice(GetDeviceRequest) returns (Device) {}
  // Lists devices.
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse) {}
  // Deletes a device.
  rpc DeleteDevice(DeleteDeviceRequest) returns (google.protobuf.Empty) {}
}

// A user's device that can receive notifications.
message Device {
  // Format: users/([a-z0-9-]{2,50})/devices/([a-zA-Z0-9-_]{2,50})
  string name = 1;
  // Device token
  string token = 2;
  // ETag
  string etag = 97;
  // Device creation time
  google.protobuf.Timestamp create_time = 98;
  // Device update time
  google.protobuf.Timestamp update_time = 99;
}

// Request message for the GetDevice method.
message GetDeviceRequest {
  // Format: users/([a-z0-9-]{2,50})/devices/([a-zA-Z0-9-_]{2,50})
  string name = 1;
}

// Request message for the ListDevices method.
message ListDevicesRequest {
  // Parent user resource.
  // Format: users/([a-z0-9-]{2,50})
  string parent = 1;
  // The maximum number of devices to return.
  // The service may return fewer than this value.
  // If not specified, returns up to 100 devices.
  int32 page_size = 2;
  // A page token, received from a previous ListDevices call.
  string page_token = 3;
  // The fields to return in snake_case.
  google.protobuf.FieldMask read_mask = 4;
  // An optional filter to apply to the list of devices.
  string filter = 5;
}

// Response message for the ListDevices method.
message ListDevicesResponse {
  // The devices.
  repeated Device devices = 1;
  // A token to retrieve the next page of results.
  string next_page_token = 2;
}

// Request message for the DeleteDevice method.
message DeleteDeviceRequest {
  // Format: users/([a-z0-9-]{2,50})/devices/([a-zA-Z0-9-_]{2,50})
  string name = 1;
}

// Request message for the RegisterDevice method.
message RegisterDeviceRequest {
  // Device id.
  //
  // In the case of Web, this can be the Firebase Instance ID.
  string device_id = 1;
  // Device token.
  string device_token = 2;
}

// Response message for the RegisterDevice method.
message RegisterDeviceResponse {}
